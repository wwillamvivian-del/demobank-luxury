<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Vault | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        #receiptOverlay { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .receipt-card { background: white; color: #1a1a1a; width: 90%; max-width: 350px; padding: 30px; border-radius: 20px; text-align: center; font-family: monospace; }
        .success-stamp { color: #10b981; border: 2px solid #10b981; display: inline-block; padding: 5px 15px; border-radius: 5px; transform: rotate(-5deg); font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-gray-500 text-sm">Welcome back,</h2>
                <h1 class="text-2xl font-bold italic">Vrime Elite Admin</h1>
            </div>
            <div class="h-12 w-12 rounded-full border-2 border-[#C5A059] flex items-center justify-center text-xs">VAULT</div>
        </header>

        <div class="glass-card p-8 rounded-3xl mb-8">
            <p class="text-gray-400 text-sm mb-2 uppercase tracking-widest">Total Asset Liquidity</p>
            <h2 id="balance-txt" class="text-5xl font-light tracking-tighter text-[#C5A059]">$542,100.00</h2>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="showAction('transfer')" class="glass-card p-6 rounded-2xl hover:bg-[#C5A059] hover:text-black transition-all">Transfer</button>
            <button onclick="showAction('withdraw')" class="glass-card p-6 rounded-2xl hover:bg-white hover:text-black transition-all">Withdraw</button>
        </div>

        <div class="glass-card p-6 rounded-3xl">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <div id="receiptOverlay">
        <div class="receipt-card">
            <h3 class="font-bold border-b pb-2 mb-4 text-black">VRIME HERITAGE RECEIPT</h3>
            <div class="text-left text-sm space-y-2">
                <p>TYPE: <span id="r-type" class="float-right"></span></p>
                <p>DATE: <span id="r-date" class="float-right"></span></p>
                <p>REF: <span id="r-ref" class="float-right text-xs"></span></p>
            </div>
            <div class="my-4 border-t border-dashed border-gray-300"></div>
            <p class="text-xs text-gray-500">AMOUNT AUTHORIZED</p>
            <p class="text-2xl font-bold" id="r-amount"></p>
            <div class="success-stamp">APPROVED</div>
            <button onclick="location.reload()" class="mt-6 w-full bg-black text-white p-3 rounded-lg text-sm">Return to Vault</button>
        </div>
    </div>

    <script>
        // Chart Logic
        const ctx = document.getElementById('growthChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr'],
                datasets: [{
                    label: 'Asset Growth',
                    data: [400000, 450000, 510000, 542100],
                    borderColor: '#C5A059',
                    tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        function showAction(type) {
            const amt = prompt("Enter amount to " + type + ":");
            if(amt && !isNaN(amt)) {
                document.getElementById('r-type').innerText = type.toUpperCase();
                document.getElementById('r-date').innerText = new Date().toLocaleDateString();
                document.getElementById('r-ref').innerText = Math.random().toString(36).substr(2, 9).toUpperCase();
                document.getElementById('r-amount').innerText = "$" + parseFloat(amt).toLocaleString();
                document.getElementById('receiptOverlay').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
