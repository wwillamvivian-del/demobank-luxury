<style>
    /* ... (Keep your existing styles) ... */

    /* Receipt Overlay */
    #receiptOverlay {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0; top: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(10px);
        align-items: center;
        justify-content: center;
    }
    .receipt-card {
        background: white;
        color: #1a1a1a;
        width: 90%;
        max-width: 350px;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        font-family: 'Courier New', Courier, monospace; /* Classic Receipt Font */
        box-shadow: 0 10px 40px rgba(197, 160, 89, 0.3);
    }
    .receipt-logo { font-family: 'Inter', sans-serif; font-weight: 800; color: #343c6a; margin-bottom: 10px; }
    .receipt-line { border-top: 1px dashed #ccc; margin: 15px 0; }
    .receipt-val { font-weight: bold; font-size: 1.2rem; margin: 5px 0; }
    .success-stamp { color: var(--green); border: 2px solid var(--green); display: inline-block; padding: 5px 15px; border-radius: 5px; transform: rotate(-5deg); font-weight: bold; margin-top: 20px; }
    .close-receipt { margin-top: 25px; background: #343c6a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
</style>

<div id="receiptOverlay">
    <div class="receipt-card">
        <div class="receipt-logo">BANKING MVP</div>
        <p style="font-size: 0.8rem; color: #666;">Transaction Authorized</p>
        <div class="receipt-line"></div>
        <div style="text-align: left; font-size: 0.9rem;">
            <p>TYPE: <span id="r-type" style="float:right"></span></p>
            <p>BANK: <span id="r-bank" style="float:right"></span></p>
            <p>REF: <span id="r-ref" style="float:right"></span></p>
            <p>DATE: <span id="r-date" style="float:right"></span></p>
        </div>
        <div class="receipt-line"></div>
        <p>TOTAL AMOUNT</p>
        <div class="receipt-val" id="r-amount"></div>
        <div class="success-stamp">APPROVED</div>
        <button class="close-receipt" onclick="closeReceipt()">Done</button>
    </div>
</div>

<script>
    // ... (Keep your existing openModal and closeModal functions) ...

    function executeAction() {
        const amt = document.getElementById('amountInput').value;
        const bank = document.getElementById('targetBank').value;
        
        if(!amt || amt <= 0) return alert("Please enter a valid amount");

        // Update Balance
        let balanceEl = document.getElementById('balance-txt');
        let currentBalance = 542100 - parseFloat(amt);
        balanceEl.innerText = "$" + currentBalance.toLocaleString();

        // Prepare Receipt Data
        document.getElementById('r-type').innerText = currentMode.toUpperCase();
        document.getElementById('r-bank').innerText = bank;
        document.getElementById('r-amount').innerText = "-$" + parseFloat(amt).toLocaleString();
        document.getElementById('r-ref').innerText = Math.floor(Math.random() * 1000000000);
        document.getElementById('r-date').innerText = new Date().toLocaleDateString();

        // Show Receipt
        document.getElementById('actionModal').style.display = 'none';
        document.getElementById('receiptOverlay').style.display = 'flex';
    }

    function closeReceipt() {
        document.getElementById('receiptOverlay').style.display = 'none';
        // Optional: Refresh history list here
    }
</script>
