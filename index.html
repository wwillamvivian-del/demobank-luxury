<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrime Heritage | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #C5A059; --dark: #0A0A0A; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #F1D39B 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-auto max-w-md bg-[#111] border border-[#222] p-8 rounded-3xl shadow-2xl">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-bold tracking-tighter uppercase italic">Vrime Heritage</h1>
            <p class="text-gray-500 text-sm mt-2">Elite Digital Banking</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Access Key</label>
                <input id="username" type="text" class="w-full bg-black border border-[#333] p-4 rounded-xl focus:border-[#C5A059] outline-none transition-all" placeholder="Enter Username">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Vault Code</label>
                <input id="password" type="password" class="w-full bg-black border border-[#333] p-4 rounded-xl focus:border-[#C5A059] outline-none transition-all" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="w-full gold-gradient text-black font-bold p-4 rounded-xl hover:opacity-90 transition-all uppercase tracking-widest text-sm">Authenticate</button>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "admin" && pass === "password") {
                window.location.href = "dashboard.html";
            } else {
                alert("Vault access denied. Check credentials.");
            }
        }
    </script>
</body>
</html>
